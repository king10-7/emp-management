spring.application.name=gov-erp

# Database Connection Settings
# Configure the application to connect to the PostgreSQL database created locally.
spring.datasource.url=jdbc:postgresql://localhost:5432/gov_erp_db
spring.datasource.username=postgres
spring.datasource.password=edouard
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configuration
# Setting ddl-auto to update will automatically create or update tables on server startup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disabling open-in-view eliminates the lazy-loading warning from Hibernate
spring.jpa.open-in-view=false

# Custom Swagger UI path definition
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Show detailed error messages
server.error.include-message=always
server.error.include-stacktrace=always
springdoc.writer-with-default-pretty-printer=true
